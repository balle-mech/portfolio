name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "develop"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build for main branch
        if: github.ref == 'refs/heads/main'
        run: |
          npm run build

      - name: Build for develop branch
        if: github.ref == 'refs/heads/develop'
        run: |
          # 環境変数を設定してビルド
          REACT_APP_ENV=preview \
          REACT_APP_BRANCH=develop \
          REACT_APP_BASE_URL=/develop \
          npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare deployment directory
        run: |
          mkdir -p ./deploy

          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            # mainブランチの場合はルートにデプロイ
            cp -r ./dist/* ./deploy/
          else
            # developブランチの場合は/develop/にデプロイ
            mkdir -p ./deploy/develop
            cp -r ./dist/* ./deploy/develop/

            # 既存のmainブランチの内容も保持
            git fetch origin gh-pages || true
            if git show-branch remotes/origin/gh-pages 2>/develop/null; then
              git checkout gh-pages
              cp -r ./* ./deploy/ 2>/develop/null || true
              git checkout ${{ github.ref_name }}
              cp -r ./dist/* ./deploy/develop/
            fi
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./src"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
